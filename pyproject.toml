[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "flamboyance"
version = "0.1.0"
description = "Spark-style master/worker/reducer orchestrator for parallelized LLM coding tasks."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "Flamboyance" }]
dependencies = []

[project.optional-dependencies]
dev = ["pytest>=7", "pytest-asyncio>=0.23"]

[project.scripts]
flamboyance = "orchestrator.cli:main"

[tool.setuptools.packages.find]
include = ["orchestrator*"]
exclude = ["tests*", "examples*"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
