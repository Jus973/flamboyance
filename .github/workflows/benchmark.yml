name: Benchmark

on:
  push:
    branches: [main]
    paths:
      - 'agents/**'
      - 'benchmark/**'
      - 'flamboyance_mcp/**'
  pull_request:
    branches: [main]
    paths:
      - 'agents/**'
      - 'benchmark/**'
      - 'flamboyance_mcp/**'
  workflow_dispatch:
    inputs:
      app:
        description: 'Specific app to benchmark (leave empty for all)'
        required: false
        default: ''

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Python dependencies
        run: |
          pip install -e ".[dev]"
          playwright install chromium
      
      - name: Install test app dependencies
        run: |
          for app in benchmark/apps/*/; do
            if [ -f "$app/package.json" ]; then
              echo "Installing dependencies for $app"
              cd "$app"
              npm install
              cd -
            fi
          done
      
      - name: Start test apps
        run: |
          # Start buggy-checkout on port 5180
          cd benchmark/apps/buggy-checkout
          npm run dev &
          cd -
          
          # Start confusing-signup on port 5181
          cd benchmark/apps/confusing-signup
          npm run dev &
          cd -
          
          # Wait for servers to be ready
          sleep 5
      
      - name: Run benchmark
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          if [ -n "${{ github.event.inputs.app }}" ]; then
            python -m benchmark --app "${{ github.event.inputs.app }}" --skip-start
          else
            python -m benchmark --skip-start
          fi
      
      - name: Generate analysis report
        run: python -m benchmark.analyze
      
      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            benchmark/results/
            benchmark/RESULTS.md
      
      - name: Check recall threshold
        run: |
          # Fail if recall drops below 50% (adjust as needed)
          python -c "
          import json
          from pathlib import Path
          
          results_dir = Path('benchmark/results')
          latest = sorted(results_dir.glob('benchmark-*.json'), reverse=True)[0]
          
          with open(latest) as f:
              data = json.load(f)
          
          total_tp = sum(r['true_positives'] for r in data['results'])
          total_fn = sum(r['false_negatives'] for r in data['results'])
          recall = total_tp / (total_tp + total_fn) if (total_tp + total_fn) > 0 else 0
          
          print(f'Aggregate recall: {recall:.1%}')
          
          if recall < 0.5:
              print('::warning::Recall is below 50% threshold')
              # Uncomment to fail the build:
              # exit(1)
          "
      
      - name: Comment on PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const results = fs.readFileSync('benchmark/RESULTS.md', 'utf8');
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## Benchmark Results\n\n' + results
            });
